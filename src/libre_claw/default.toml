[general]
default_provider = "anthropic"
default_model = "claude-opus-4-8"
working_directory = "."
# Theme controls the TUI and the dashboard default.
# Supported: lobster, dark, light, libre-default, github-dark, github-light,
# monokai-pro, night-owl, tokyo-night, ayu, dracula, catppuccin-mocha,
# catppuccin-latte, gruvbox-dark, nord, solarized-dark, solarized-light,
# one-dark-pro, rose-pine, kanagawa, matrix.
theme = "lobster"
log_level = "info"

[agent]
max_tool_calls_per_turn = 50
auto_compact_threshold = 0.8
context_window_tokens = 200000
provider_retry_attempts = 2
provider_retry_initial_delay = 1.0
system_prompt = """
You are Libre Claw, an autonomous coding agent built by Kroonen AI (https://kroonen.ai) running in the user's terminal.
You have access to tools for reading files, writing files, editing files, listing directories, searching code, inspecting git, browsing web pages, extracting browser data, running browser JavaScript, fetching HTTP URLs/APIs, thinking through plans, and running shell commands.

RULES:
- Always read before editing. Understand the codebase before making changes.
- Make minimal, surgical edits. Never rewrite entire files when a targeted fix suffices.
- Explain what you're about to do before doing it, but keep it brief.
- If a task is ambiguous, make a reasonable assumption, proceed, and note the assumption.
- After making changes, verify them with available commands unless the user says otherwise.
- Never delete files or run destructive commands without explicit user approval.
- When you're done, summarize what you changed and why.

Current toolset: read_file, write_file, edit_file, list_directory, glob, search_files, git_status, git_commit, think, browser_navigate, browser_read, browser_extract, browser_execute, browser_dismiss_cookies, browser_click, browser_type, browser_wait, browser_download, browser_screenshot, http_request, and bash.
"""
system_prompt_extra = ""
# Persona customization is loaded from ~/.libre-claw/SOUL.md,
# .libre-claw/SOUL.md, and ./SOUL.md at runtime.

[providers.anthropic]
api_key_env = "ANTHROPIC_API_KEY"
default_model = "claude-opus-4-8"
max_tokens = 16384

[providers.openai]
api_key_env = "OPENAI_API_KEY"
default_model = "gpt-5.5"
max_tokens = 16384

[providers.openrouter]
api_key_env = "OPENROUTER_API_KEY"
base_url = "https://openrouter.ai/api/v1"
default_model = "openrouter/auto"
max_tokens = 16384
auto_context_window = true

[providers.codex]
default_model = "gpt-5.5"
executable = "codex"
sandbox = "workspace-write" # read-only | workspace-write | danger-full-access
approval_policy = "never" # untrusted | on-failure | on-request | never
timeout = 900

[providers.ollama]
base_url = "http://localhost:11434"
default_model = "qwen3.6:27b"
api_format = "ollama" # ollama | openai
api_key_env = "OLLAMA_API_KEY" # optional locally, required for https://ollama.com
max_tokens = 16384
supports_tools = true
tool_mode = "auto" # auto | native | xml

[permissions]
default_level = "ask"
auto_approve_read = true

[sandbox]
command_timeout = 120
allow_sudo = false
blocked_patterns = [
  "rm -rf /",
  "rm -fr /",
  "rm -rf -- /",
  ":(){ :|:& };:",
  "curl | sh",
  "curl|sh",
  "curl | bash",
  "curl|bash",
  "wget | sh",
  "wget|sh",
  "wget | bash",
  "wget|bash",
]
restrict_to_working_dir = true

[auth]
keyring_service = "libre-claw"
fallback_keys_path = "~/.libre-claw/.keys"
jwt_secret_env = "LIBRE_CLAW_JWT_SECRET"
oauth_issuer = "libre-claw"
oauth_client_id = "libre-claw-local"
oauth_redirect_uri = "http://127.0.0.1:8765/callback"
token_ttl_seconds = 3600

[tui]
show_file_tree = false
show_status_bar = true
vim_keybindings = false
use_daemon = false # when true, the TUI starts and polls daemon-owned runs
mouse = false # keep native terminal text selection available by default
inline = false # use full-screen alternate-screen mode by default; pass --inline for terminal scrollback

[telegram]
enabled = false
use_daemon = false # when true, Telegram starts/runs tasks through libre-claw daemon
bot_token_env = "TELEGRAM_BOT_TOKEN"
allowed_user_ids = [123456789]
max_message_length = 4000
stream_update_interval = 1.5
default_provider = "anthropic"
default_model = "claude-opus-4-8"

[goal]
max_turns = 20
judge_provider = "current" # current | anthropic | openai | openrouter | ollama | codex
judge_model = "" # empty means use the selected judge provider default/current model
judge_temperature = 0.0
judge_max_tokens = 1024

[fallback]
enabled = false
recheck_after_attempts = 3 # while using a fallback, retry higher-priority providers after this many provider calls
routes = []
# Example:
# [[fallback.routes]]
# provider = "openrouter"
# model = "openrouter/auto"
# api_key_env = "OPENROUTER_API_KEY_BACKUP" # optional; omit to use the normal provider key

[heartbeat]
enabled = false
interval_minutes = 60
route = "tui" # tui | telegram | report
telegram_chat_id = 0 # required only when route = "telegram"
provider = "" # empty means current provider
model = "" # empty means current model
checklist = [
  "Review active and recent runs.",
  "Check blocked approvals.",
  "Look for notable repository changes.",
  "Report risks, next actions, and anything that needs attention.",
]
prompt = "" # optional full custom heartbeat prompt; when empty, checklist is used

[memory]
enabled = true
auto_extract = true
auto_summarize = true
inject_relevant = true
max_injected_items = 8
max_injected_tokens = 1200
redact_secrets = true
archive_sessions = true

[daemon]
host = "127.0.0.1"
port = 8766
poll_interval = 0.5
detach = false

[automations]
enabled = true
root = "~/.libre-claw/automations"
poll_interval = 30.0
max_due_per_tick = 5
auto_approve_tools = [
  "bash",
  "http_request",
  "read_file",
  "list_directory",
  "search_files",
  "glob",
  "browser_read",
  "browser_screenshot",
  "browser_extract",
]
finalizer_max_tokens = 3000
finalizer_max_context_chars = 70000

[browser]
allowed_domains = [] # empty allows any http(s) host not in denied_domains
denied_domains = []
profile_dir = "~/.libre-claw/browser/profiles"
downloads_dir = ".libre-claw/browser/downloads"
screenshots_dir = ".libre-claw/browser/screenshots"
default_timeout_ms = 30000
headless = true

[mcp]
enabled = false
allowlist = [] # expose only server.tool names listed here; empty means use each server's tools list
permission_level = "ask" # allow | ask | deny for external MCP tools
tool_timeout = 30

[mcp.servers]
# Example:
# [mcp.servers.filesystem]
# command = ["npx", "-y", "@modelcontextprotocol/server-filesystem", "."]
# tools = ["read_file", "list_directory"]
